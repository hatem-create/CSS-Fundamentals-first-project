<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frontend Mentor | Product preview card component</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
  <body>
    <div class="container">
      <img
        class="image-of-perfume"
        src="images/image-product-desktop.jpg"
        alt="image-of-perfume"
      />
      <div class="product-info-box">
        <header class="heading">
          <p class="first-word">Perfume</p>
          <h1 class="main-title">Gabrielle Essence Eau De Parfum</h1>
        </header>
        <article>
          <ul class="description">
            <li>A floral, solar and voluptuous</li>
            <li>interpretation composed by</li>
            <li>Olivier Polge, Perfumer-Creator</li>
            <li>for the House of CHANEL.</li>
          </ul>
        </article>
        <div class="price-box">
          <span class="new-price">$149.99</span>
          <span class="real-price">$169.99</span>
        </div>
        <button class="cart-button">🛒 Add to Cart</button>
      </div>
    </div>
  </body>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/hatem-create/hatem-create">Hatem</a>.
  </footer>
</html>
